name: PyInstaller Build

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
            platform: linux-x86_64
          - os: windows-latest
            platform: windows-amd64
          - os: macos-15-intel
            platform: macos-amd64
          - os: macos-latest
            platform: macos-arm64
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout Repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Install Package Manager
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          enable-cache: true
      - name: Install Python 3.14 (Linux Only)
        if: matrix.os == 'ubuntu-22.04'
        env:
          DEBIAN_FRONTEND: noninteractive
        run: |
          sudo add-apt-repository ppa:deadsnakes/ppa -y
          sudo apt-get update
          sudo apt-get install -y python3.14-tk libpython3.14
          uv venv .venv --python /usr/bin/python3.14 --seed
      - name: Install Python 3.14 (macOS/Windows)
        if: matrix.os != 'ubuntu-22.04'
        run: uv python install 3.14
      - name: Install Dependencies
        run: uv sync --extra gui --no-dev
      - name: Build PyInstaller Executable
        shell: bash
        run: |
          if [ "${{ matrix.platform }}" = "macos-arm64" ]; then
            export MACOS_ARCH="arm64"
          elif [ "${{ matrix.platform }}" = "macos-amd64" ]; then
            export MACOS_ARCH="x86_64"
          fi
          uv run pyinstaller main.spec --noconfirm
      - name: Generate AppImage (Linux Only)
        if: matrix.os == 'ubuntu-22.04'
        shell: bash
        run: |
          mkdir -p dist/AppDir/usr/bin
          cp images/icon.png dist/AppDir/jellyfin-rpc.png
          mv "dist/Jellyfin RPC" dist/AppDir/usr/bin/jellyfin-rpc

          mkdir -p dist/AppDir/usr/share/icons/hicolor/256x256/apps
          mkdir -p dist/AppDir/usr/share/icons/hicolor/512x512/apps
          cp images/icon-256x256.png dist/AppDir/usr/share/icons/hicolor/256x256/apps/jellyfin-rpc.png
          cp images/icon-512x512.png dist/AppDir/usr/share/icons/hicolor/512x512/apps/jellyfin-rpc.png

          cat << 'EOF' > dist/AppDir/jellyfin-rpc.desktop
          [Desktop Entry]
          Type=Application
          Name=Jellyfin RPC
          Comment=Discord Rich Presence for Jellyfin
          Exec=jellyfin-rpc
          Icon=jellyfin-rpc
          Terminal=false
          Categories=Network;
          StartupWMClass=jellyfin-rpc
          EOF

          cat << 'EOF' > dist/AppDir/AppRun
          #!/bin/sh
          APPDIR="$(dirname "$(readlink -f "${0}")")"
          exec "${APPDIR}/usr/bin/jellyfin-rpc" "$@"
          EOF
          chmod +x dist/AppDir/AppRun

          wget -q https://github.com/AppImage/appimagetool/releases/download/continuous/appimagetool-x86_64.AppImage
          chmod +x appimagetool-x86_64.AppImage
          ./appimagetool-x86_64.AppImage --appimage-extract
          mv squashfs-root appimagetool.AppDir

          export ARCH=x86_64
          ./appimagetool.AppDir/AppRun dist/AppDir "dist/Jellyfin RPC.AppImage"
          rm -rf dist/AppDir appimagetool.AppDir appimagetool-x86_64.AppImage
      - name: Isolate App Bundle (macOS Only)
        if: startsWith(matrix.os, 'macos')
        run: |
          mkdir -p dist/app_bundle
          mv "dist/Jellyfin RPC.app" dist/app_bundle/
      - name: Isolate Windows Binary (Windows Only)
        if: startsWith(matrix.os, 'windows')
        run: |
          mkdir -p "dist/Jellyfin RPC"
          mv "dist/Jellyfin RPC.exe" "dist/Jellyfin RPC/"
      - name: Prepare Artifact Name
        shell: bash
        run: |
          VERSION=$(uv version --short)
          echo "ARTIFACT_NAME=jellyfin-rpc-$VERSION-${{ matrix.platform }}" >> $GITHUB_ENV
      - name: Upload Artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ${{ env.ARTIFACT_NAME }}
          path: >-
            ${{ startsWith(matrix.os, 'macos')
                && 'dist/app_bundle/*'
                || 'dist/*' }}
