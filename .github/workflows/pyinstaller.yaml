name: PyInstaller Build

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            platform: linux-x86_64
          - os: windows-latest
            platform: windows-amd64
          - os: macos-15-intel
            platform: macos-amd64
          - os: macos-latest
            platform: macos-arm64
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout Repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - name: Install Package Manager
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          enable-cache: true
      - name: Install System Python 3.14 (Linux Only)
        if: matrix.os == 'ubuntu-latest'
        env:
          DEBIAN_FRONTEND: noninteractive
        run: |
          sudo add-apt-repository ppa:deadsnakes/ppa -y
          sudo apt-get update
          sudo apt-get install -y python3.14-tk libpython3.14
      - name: Create Python Environment
        shell: bash
        run: |
          if [ "${{ matrix.os }}" = "ubuntu-latest" ]; then
            uv venv .venv --python /usr/bin/python3.14 --seed
          else
            uv venv .venv --python 3.14
          fi
      - name: Install Dependencies
        run: uv sync --extra gui --no-dev
      - name: Build PyInstaller Executable
        shell: bash
        run: |
          if [ "${{ matrix.platform }}" = "macos-arm64" ]; then
            export MACOS_ARCH="arm64"
          elif [ "${{ matrix.platform }}" = "macos-amd64" ]; then
            export MACOS_ARCH="x86_64"
          fi
          uv run pyinstaller main.spec --noconfirm
      - name: Isolate App Bundle (macOS Only)
        if: startsWith(matrix.os, 'macos')
        run: |
          mkdir -p dist/app_bundle
          mv "dist/Jellyfin RPC.app" dist/app_bundle/
      - name: Prepare Artifact Name
        shell: bash
        run: |
          VERSION=$(uv version --short)
          echo "ARTIFACT_NAME=jellyfin-rpc-$VERSION-${{ matrix.platform }}" >> $GITHUB_ENV
      - name: Upload Artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ${{ env.ARTIFACT_NAME }}
          path: >-
            ${{ startsWith(matrix.os, 'macos')
                && 'dist/app_bundle/*'
                || 'dist/*' }}
